<!DOCTYPE html>
<html>
<head>
  <title>My Essays</title>
  <style>
    body {
      font-family: Times New Roman, serif;
      background: white;
      color: black;
      max-width: 700px;
      margin: 40px auto;
      line-height: 1.6;
      font-size: 18px;
    }

    a {
      color: blue;
      text-decoration: underline;
    }
    #jaguarCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
}
  </style>
</head>
<body>

<h1>My Essays</h1>

<p>This is your homepage.</p>
<script>
const canvas = document.getElementById("jaguarCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

const jaguarFrames = [
  [
    "  🟩🟩🟩  ",
    " 🟩⬛🟩⬛🟩 ",
    "🟩🟩🟩🟩🟩",
    " 🟩🟩🟩🟩 ",
    "  🟩  🟩  "
  ],
  [
    "  🟩🟩🟩  ",
    " 🟩⬛🟩⬛🟩 ",
    "🟩🟩🟩🟩🟩",
    "  🟩🟩🟩🟩",
    " 🟩  🟩  "
  ]
];

let x = -100;
let y = window.innerHeight * 0.7;
let frame = 0;

function draw(sprite, x, y, size = 8) {
  for (let r = 0; r < sprite.length; r++) {
    for (let c = 0; c < sprite[r].length; c++) {
      const ch = sprite[r][c];

      if (ch === "🟩") ctx.fillStyle = "#00ff4c";
      else if (ch === "⬛") ctx.fillStyle = "#000000";
      else continue;

      ctx.fillRect(x + c * size, y + r * size, size, size);
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  x += 4;
  if (x > canvas.width + 100) x = -120;

  y = window.innerHeight * 0.7 + Math.sin(Date.now() * 0.02) * 5;

  draw(jaguarFrames[Math.floor(Date.now() / 150) % 2], x, y);

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
<canvas id="jaguarCanvas"></canvas>
</html>
